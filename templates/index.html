<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>

    <script>

        }

    <style>

        .hero-title { font-family: 'Outfit', sans-serif; letter-spacing: -0.02em; }
        .gradient-text { background: linear-gradient(135deg, #34D399 0%, #60A5FA 50%, #A855F7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
